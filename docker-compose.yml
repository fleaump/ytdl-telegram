services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api-server
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - telegram-bot-api-temp:/var/lib/telegram-bot-api-temp
    ports:
      - "8081:8081"
    restart: unless-stopped

  yt-dl-bot:
    build: .
    container_name: youtube-downloader-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-}
      - LOCAL_BOT_API_URL=http://telegram-bot-api:8081
      - YOUTUBE_COOKIES_FILE=/app/cookies.txt
    volumes:
      - downloads:/tmp/downloads
      - ./cookies.txt:/app/cookies.txt:ro
    depends_on:
      - telegram-bot-api
    restart: unless-stopped

volumes:
  downloads:
  telegram-bot-api-data:
  telegram-bot-api-temp:
